<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bansal Constructions — Building Tomorrow </title>
</head>
<body>

    <h1>Look at the browser tab above!</h1>

    <script>
        let docTitle = document.title;
        
        // Function to make the title scroll
        setInterval(() => {
            // Take the first character and move it to the end
            docTitle = docTitle.substring(1) + docTitle.substring(0, 1);
            document.title = docTitle;
        }, 150); // Speed in milliseconds (lower = faster)
    </script>
</body>
</html>
