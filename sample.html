<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAUS — Walk Through Your Dream Home</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@100;200;300;400&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --gold: #c9a84c;
            --cream: #f5f0e8;
            --dark: #06050a;
        }

        body {
            background: #000;
            color: var(--cream);
            font-family: 'Jost', sans-serif;
            font-weight: 200;
            overflow-x: hidden;
            cursor: none;
        }

        #cursor {
            position: fixed;
            width: 10px;
            height: 10px;
            background: var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width .2s, height .2s, opacity .2s
        }

        #cursor-ring {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 1.5px solid rgba(201, 168, 76, .5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            transition: width .4s, height .4s, opacity .3s
        }

        /* SCROLL DRIVER — tall page */
        #scroll-driver {
            height: 700vh;
            position: relative
        }

        /* FIXED VIEWPORT — the "camera" */
        #viewport {
            position: fixed;
            inset: 0;
            overflow: hidden;
            background: #000;
        }

        /* THE HOUSE — one long perspective hallway rendered in CSS 3D */
        #house-scene {
            position: absolute;
            inset: 0;
            perspective: 900px;
            perspective-origin: 50% 48%;
        }

        #camera {
            position: absolute;
            inset: 0;
            transform-style: preserve-3d;
            /* JS drives translateZ to move camera forward */
        }

        /* ============ ROOMS ============ */
        /* Each room is a CSS 3D box placed along the Z axis */
        .room {
            position: absolute;
            left: 50%;
            top: 50%;
            transform-style: preserve-3d;
            transform: translate(-50%, -50%);
        }

        /* FACES of each room */
        .face {
            position: absolute;
            backface-visibility: hidden;
        }

        /* ---- HUD / UI ---- */
        #hud {
            position: fixed;
            z-index: 200;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 2.5rem 3.5rem;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            letter-spacing: .3em;
            font-weight: 300;
        }

        .nav-items {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-items li {
            font-size: .65rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            opacity: .5
        }

        .nav-items li.active {
            opacity: 1;
            color: var(--gold)
        }

        #bottom-bar {
            padding: 2.5rem 3.5rem;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }

        #room-label {
            display: flex;
            flex-direction: column;
            gap: .4rem;
        }

        #room-eyebrow {
            font-size: .6rem;
            letter-spacing: .4em;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0;
            transition: opacity .5s, transform .5s;
            transform: translateY(10px);
        }

        #room-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 5vw, 5rem);
            font-weight: 300;
            line-height: 1;
            opacity: 0;
            transition: opacity .6s .1s, transform .6s .1s;
            transform: translateY(20px);
        }

        #room-title em {
            font-style: italic;
            color: rgba(201, 168, 76, .8)
        }

        #room-desc {
            font-size: .78rem;
            line-height: 1.9;
            color: rgba(245, 240, 232, .55);
            max-width: 340px;
            margin-top: .8rem;
            opacity: 0;
            transition: opacity .6s .2s, transform .6s .2s;
            transform: translateY(15px);
        }

        .label-visible #room-eyebrow,
        .label-visible #room-title,
        .label-visible #room-desc {
            opacity: 1;
            transform: translateY(0)
        }

        #scroll-hint {
            display: flex;
            align-items: center;
            gap: .8rem;
            font-size: .6rem;
            letter-spacing: .3em;
            text-transform: uppercase;
            color: rgba(245, 240, 232, .35);
        }

        .hint-line {
            width: 40px;
            height: 1px;
            background: rgba(201, 168, 76, .4);
            animation: linePulse 2s infinite
        }

        @keyframes linePulse {

            0%,
            100% {
                opacity: .3
            }

            50% {
                opacity: 1
            }
        }

        /* Progress track */
        #progress-track {
            position: fixed;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: .6rem;
            align-items: center;
            z-index: 200;
            pointer-events: none;
        }

        .p-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(201, 168, 76, .25);
            transition: all .4s;
        }

        .p-dot.active {
            background: var(--gold);
            width: 20px;
            border-radius: 3px
        }

        /* CANVAS for room rendering */
        #room-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* TRANSITION overlay */
        #transition {
            position: fixed;
            inset: 0;
            background: #000;
            opacity: 0;
            pointer-events: none;
            z-index: 500;
            transition: opacity .4s;
        }

        #transition.flash {
            opacity: .6
        }

        /* INTRO screen */
        #intro {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 1.5rem;
            background: var(--dark);
            transition: opacity .8s, visibility .8s;
        }

        #intro.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none
        }

        #intro h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3.5rem, 8vw, 8rem);
            font-weight: 300;
            line-height: .95;
        }

        #intro h1 em {
            font-style: italic;
            color: var(--gold)
        }

        #intro p {
            font-size: .75rem;
            letter-spacing: .3em;
            text-transform: uppercase;
            color: rgba(245, 240, 232, .4)
        }

        .enter-btn {
            margin-top: 1.5rem;
            font-size: .65rem;
            letter-spacing: .35em;
            text-transform: uppercase;
            border: 1px solid rgba(201, 168, 76, .4);
            padding: 1rem 2.5rem;
            color: var(--gold);
            background: none;
            cursor: pointer;
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            transition: all .3s;
        }

        .enter-btn:hover {
            background: var(--gold);
            color: #000;
            border-color: var(--gold)
        }

        .scroll-arrow {
            position: absolute;
            bottom: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: .6rem;
            font-size: .55rem;
            letter-spacing: .3em;
            text-transform: uppercase;
            color: rgba(245, 240, 232, .3);
        }

        .arr-line {
            width: 1px;
            height: 50px;
            background: linear-gradient(to bottom, rgba(201, 168, 76, .5), transparent);
            animation: arrDrop 2s infinite;
        }

        @keyframes arrDrop {

            0%,
            100% {
                transform: scaleY(1);
                opacity: .5
            }

            50% {
                transform: scaleY(1.3);
                opacity: 1
            }
        }
    </style>
</head>

<body>

    <div id="cursor"></div>
    <div id="cursor-ring"></div>
    <div id="transition"></div>

    <!-- INTRO SPLASH -->
    <div id="intro">
        <p style="font-size:.6rem;letter-spacing:.5em;text-transform:uppercase;color:var(--gold)">Luxury Interior
            Design</p>
        <h1>Walk Through<br>Your <em>Dream</em><br>Home</h1>
        <p>A cinematic tour — scroll to move through each room</p>
        <button class="enter-btn" onclick="startExperience()">Enter Home</button>
        <div class="scroll-arrow">
            <div class="arr-line"></div><span>Scroll</span>
        </div>
    </div>

    <!-- SCROLL DRIVER -->
    <div id="scroll-driver"></div>

    <!-- FIXED VIEWPORT -->
    <div id="viewport">
        <canvas id="room-canvas"></canvas>
    </div>

    <!-- HUD -->
    <div id="hud">
        <div id="top-bar">
            <div class="logo">HAUS</div>
            <ul class="nav-items" id="nav-items">
                <li data-room="0">Entrance</li>
                <li data-room="1">Lobby</li>
                <li data-room="2">Kitchen</li>
                <li data-room="3">Bathroom</li>
                <li data-room="4">Bedroom</li>
            </ul>
        </div>
        <div id="bottom-bar">
            <div id="room-label">
                <span id="room-eyebrow"></span>
                <h2 id="room-title"></h2>
                <p id="room-desc"></p>
            </div>
            <div id="scroll-hint">
                <div class="hint-line"></div>
                <span>Scroll to walk</span>
            </div>
        </div>
    </div>

    <div id="progress-track">
        <div class="p-dot active"></div>
        <div class="p-dot"></div>
        <div class="p-dot"></div>
        <div class="p-dot"></div>
        <div class="p-dot"></div>
    </div>

    <script>
        const canvas = document.getElementById('room-canvas');
        const ctx = canvas.getContext('2d');
        const W = () => canvas.width = window.innerWidth;
        const H = () => canvas.height = window.innerHeight;
        W(); H();
        window.addEventListener('resize', () => { W(); H(); draw(); });

        // Cursor
        const cur = document.getElementById('cursor');
        const ring = document.getElementById('cursor-ring');
        let mx = 0, my = 0, rx = 0, ry = 0;
        document.addEventListener('mousemove', e => {
            mx = e.clientX; my = e.clientY;
            cur.style.left = mx + 'px'; cur.style.top = my + 'px';
        });
        (function animCur() {
            rx += (mx - rx) * .1; ry += (my - ry) * .1;
            ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
            requestAnimationFrame(animCur);
        })();

        // ============================================================
        // ROOM DEFINITIONS
        // Each room is painted on the canvas as a perspective box
        // We lerp the "camera Z" to move through them
        // ============================================================
        const ROOMS = [
            {
                id: 'entrance',
                label: 'Entrance',
                eyebrow: '00 — Welcome',
                title: 'Your <em>Grand</em> Entrance',
                desc: 'Double-height ceilings, hand-laid limestone floors, and a statement chandelier that sets the tone for every room beyond.',
                floor: '#1a1410',
                ceiling: '#0d0c0a',
                walls: ['#181410', '#181410', '#1a1510'],
                accent: '#c9a84c',
                features: drawEntrance,
            },
            {
                id: 'lobby',
                label: 'Lobby',
                eyebrow: '01 — Living',
                title: 'The <em>Open</em> Lobby',
                desc: 'An airy double-volume foyer with floating staircase, gallery walls, and cascading greenery — a living gallery for your home.',
                floor: '#15120c',
                ceiling: '#0a0908',
                walls: ['#161210', '#161210', '#181410'],
                accent: '#c9a84c',
                features: drawLobby,
            },
            {
                id: 'kitchen',
                label: 'Kitchen',
                eyebrow: '02 — Kitchen',
                title: 'Modern <em>Chef\'s</em> Kitchen',
                desc: 'Carrara marble island, matte onyx cabinetry, and professional-grade appliances. Make cooking a ceremony.',
                floor: '#131008',
                ceiling: '#090807',
                walls: ['#141008', '#141008', '#161209'],
                accent: '#e8d5a3',
                features: drawKitchen,
            },
            {
                id: 'bathroom',
                label: 'Bathroom',
                eyebrow: '03 — Bathroom',
                title: 'Spa <em>Luxury</em> Bath',
                desc: 'Freestanding sculptural tub, book-matched Calacatta marble, and brushed gold fixtures. Bathe in absolute serenity.',
                floor: '#080c10',
                ceiling: '#060810',
                walls: ['#090d12', '#090d12', '#0a0e14'],
                accent: '#a0c8e8',
                features: drawBathroom,
            },
            {
                id: 'bedroom',
                label: 'Bedroom',
                eyebrow: '04 — Bedroom',
                title: '<em>Serene</em> Master Suite',
                desc: 'Velvet headboard, herringbone oak floors, and layered lighting that shifts from dawn gold to dusk violet. Sleep like royalty.',
                floor: '#0c0a10',
                ceiling: '#08070c',
                walls: ['#0d0b12', '#0d0b12', '#0f0d14'],
                accent: '#b090d8',
                features: drawBedroom,
            }
        ];

        let scrollProgress = 0; // 0..1
        let currentRoom = 0;
        let targetRoom = 0;
        let smoothProgress = 0;
        let started = false;
        const TOTAL_ROOMS = ROOMS.length;

        function startExperience() {
            document.getElementById('intro').classList.add('hidden');
            started = true;
            animate();
        }

        // SCROLL
        const driver = document.getElementById('scroll-driver');
        window.addEventListener('scroll', () => {
            if (!started) return;
            const maxScroll = driver.offsetHeight - window.innerHeight;
            scrollProgress = Math.max(0, Math.min(1, window.scrollY / maxScroll));
            const rawRoom = scrollProgress * (TOTAL_ROOMS - 1);
            updateRoom(rawRoom);
        });

        function updateRoom(rawRoom) {
            targetRoom = rawRoom;
            const roomIdx = Math.min(Math.floor(rawRoom + 0.15), TOTAL_ROOMS - 1);
            const room = ROOMS[roomIdx];

            // Update nav
            document.querySelectorAll('#nav-items li').forEach((el, i) => {
                el.classList.toggle('active', i === roomIdx);
            });

            // Update progress dots
            document.querySelectorAll('.p-dot').forEach((el, i) => {
                el.classList.toggle('active', i === roomIdx);
            });

            // Update text label
            const labelEl = document.getElementById('room-label');
            const prevRoom = labelEl.dataset.room;
            if (prevRoom !== String(roomIdx)) {
                labelEl.dataset.room = roomIdx;
                labelEl.classList.remove('label-visible');
                setTimeout(() => {
                    document.getElementById('room-eyebrow').innerHTML = room.eyebrow;
                    document.getElementById('room-title').innerHTML = room.title;
                    document.getElementById('room-desc').textContent = room.desc;
                    labelEl.classList.add('label-visible');
                }, 200);
            }
        }

        // ANIMATION LOOP
        let lastTime = 0;
        function animate(time = 0) {
            const dt = Math.min((time - lastTime) / 1000, 0.05);
            lastTime = time;
            smoothProgress += (targetRoom - smoothProgress) * (1 - Math.exp(-dt * 8));
            draw();
            requestAnimationFrame(animate);
        }

        // ============================================================
        // MAIN DRAW — perspective corridor
        // ============================================================
        function draw() {
            const w = canvas.width, h = canvas.height;
            ctx.clearRect(0, 0, w, h);

            const roomIdx = Math.floor(smoothProgress);
            const frac = smoothProgress - roomIdx; // 0..1 within current room
            const nextIdx = Math.min(roomIdx + 1, TOTAL_ROOMS - 1);

            const curRoom = ROOMS[Math.min(roomIdx, TOTAL_ROOMS - 1)];
            const nextRoom = ROOMS[nextIdx];

            // lerp colors
            function lerpHex(a, b, t) {
                const ar = parseInt(a.slice(1, 3), 16), ag = parseInt(a.slice(3, 5), 16), ab = parseInt(a.slice(5, 7), 16);
                const br = parseInt(b.slice(1, 3), 16), bg = parseInt(b.slice(3, 5), 16), bb = parseInt(b.slice(5, 7), 16);
                return `rgb(${Math.round(ar + (br - ar) * t)},${Math.round(ag + (bg - ag) * t)},${Math.round(ab + (bb - ab) * t)})`;
            }

            const fl = lerpHex(curRoom.floor, nextRoom.floor, frac);
            const cl = lerpHex(curRoom.ceiling, nextRoom.ceiling, frac);
            const wl = lerpHex(curRoom.walls[0], nextRoom.walls[0], frac);
            const wr = lerpHex(curRoom.walls[1], nextRoom.walls[1], frac);
            const wb = lerpHex(curRoom.walls[2], nextRoom.walls[2], frac);

            // The "vanishing point" shifts slightly with frac to give motion feel
            const vx = w / 2 + (frac - 0.5) * w * 0.04;
            const vy = h * 0.48 + (frac - 0.5) * h * 0.01;

            // Room depth: as frac increases, we zoom into next room
            // near = room edges, far = back wall
            const nearScale = 1.0;
            const farScale = 0.28 - frac * 0.09;

            const nW = w * nearScale, nH = h * nearScale;
            const fW = w * farScale, fH = h * farScale;

            // corners: near (screen edges), far (centered, scaled)
            const nTL = [vx - nW / 2, vy - nH / 2];
            const nTR = [vx + nW / 2, vy - nH / 2];
            const nBL = [vx - nW / 2, vy + nH / 2];
            const nBR = [vx + nW / 2, vy + nH / 2];

            const fTL = [vx - fW / 2, vy - fH / 2];
            const fTR = [vx + fW / 2, vy - fH / 2];
            const fBL = [vx - fW / 2, vy + fH / 2];
            const fBR = [vx + fW / 2, vy + fH / 2];

            // FLOOR
            ctx.beginPath();
            ctx.moveTo(nBL[0], nBL[1]);
            ctx.lineTo(nBR[0], nBR[1]);
            ctx.lineTo(fBR[0], fBR[1]);
            ctx.lineTo(fBL[0], fBL[1]);
            ctx.closePath();
            const flGrad = ctx.createLinearGradient(0, vy, 0, h);
            flGrad.addColorStop(0, fl);
            flGrad.addColorStop(1, shadeColor(fl, -30));
            ctx.fillStyle = flGrad;
            ctx.fill();

            // CEILING
            ctx.beginPath();
            ctx.moveTo(nTL[0], nTL[1]);
            ctx.lineTo(nTR[0], nTR[1]);
            ctx.lineTo(fTR[0], fTR[1]);
            ctx.lineTo(fTL[0], fTL[1]);
            ctx.closePath();
            const ceGrad = ctx.createLinearGradient(0, 0, 0, vy);
            ceGrad.addColorStop(0, shadeColor(cl, -20));
            ceGrad.addColorStop(1, cl);
            ctx.fillStyle = ceGrad;
            ctx.fill();

            // LEFT WALL
            ctx.beginPath();
            ctx.moveTo(nTL[0], nTL[1]);
            ctx.lineTo(nBL[0], nBL[1]);
            ctx.lineTo(fBL[0], fBL[1]);
            ctx.lineTo(fTL[0], fTL[1]);
            ctx.closePath();
            const lwGrad = ctx.createLinearGradient(0, 0, w * 0.4, 0);
            lwGrad.addColorStop(0, shadeColor(wl, -25));
            lwGrad.addColorStop(1, wl);
            ctx.fillStyle = lwGrad;
            ctx.fill();

            // RIGHT WALL
            ctx.beginPath();
            ctx.moveTo(nTR[0], nTR[1]);
            ctx.lineTo(nBR[0], nBR[1]);
            ctx.lineTo(fBR[0], fBR[1]);
            ctx.lineTo(fTR[0], fTR[1]);
            ctx.closePath();
            const rwGrad = ctx.createLinearGradient(w, 0, w * 0.6, 0);
            rwGrad.addColorStop(0, shadeColor(wr, -25));
            rwGrad.addColorStop(1, wr);
            ctx.fillStyle = rwGrad;
            ctx.fill();

            // BACK WALL
            ctx.beginPath();
            ctx.moveTo(fTL[0], fTL[1]);
            ctx.lineTo(fTR[0], fTR[1]);
            ctx.lineTo(fBR[0], fBR[1]);
            ctx.lineTo(fBL[0], fBL[1]);
            ctx.closePath();
            ctx.fillStyle = wb;
            ctx.fill();

            // Draw perspective grid lines (floor)
            drawPerspectiveGrid(ctx, vx, vy, nBL, nBR, fBL, fBR, frac);

            // Draw room features (furniture, fixtures)
            const featCtx = { ctx, w, h, vx, vy, nTL, nTR, nBL, nBR, fTL, fTR, fBL, fBR, frac, fW, fH, farScale };
            curRoom.features(featCtx, 1 - frac);
            if (frac > 0.01 && nextIdx !== roomIdx) {
                nextRoom.features(featCtx, frac * 0.6);
            }

            // Vignette
            drawVignette(w, h);

            // Floor skirting line
            ctx.beginPath();
            ctx.moveTo(nBL[0], nBL[1]);
            ctx.lineTo(fBL[0], fBL[1]);
            const goldAlpha = `rgba(201,168,76,${0.15 * (1 - frac * 0.5)})`;
            ctx.strokeStyle = goldAlpha;
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(nBR[0], nBR[1]);
            ctx.lineTo(fBR[0], fBR[1]);
            ctx.strokeStyle = goldAlpha;
            ctx.stroke();

            // Ceiling cornice
            ctx.beginPath();
            ctx.moveTo(nTL[0], nTL[1]);
            ctx.lineTo(fTL[0], fTL[1]);
            ctx.strokeStyle = `rgba(201,168,76,${0.1})`;
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(nTR[0], nTR[1]);
            ctx.lineTo(fTR[0], fTR[1]);
            ctx.stroke();
        }

        function drawPerspectiveGrid(ctx, vx, vy, nBL, nBR, fBL, fBR, frac) {
            ctx.save();
            ctx.globalAlpha = 0.06 + frac * 0.02;
            ctx.strokeStyle = '#c9a84c';
            ctx.lineWidth = 0.5;
            // floor lines converging to VP
            for (let i = 0; i <= 8; i++) {
                const t = i / 8;
                const nx = nBL[0] + (nBR[0] - nBL[0]) * t;
                ctx.beginPath();
                ctx.moveTo(nx, nBL[1]);
                ctx.lineTo(vx, vy);
                ctx.stroke();
            }
            // horizontal floor lines
            for (let d = 0.15; d < 1; d += 0.18) {
                const lx1 = nBL[0] + (fBL[0] - nBL[0]) * d;
                const ly1 = nBL[1] + (fBL[1] - nBL[1]) * d;
                const lx2 = nBR[0] + (fBR[0] - nBR[0]) * d;
                const ly2 = nBR[1] + (fBR[1] - nBR[1]) * d;
                ctx.beginPath();
                ctx.moveTo(lx1, ly1);
                ctx.lineTo(lx2, ly2);
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawVignette(w, h) {
            const vg = ctx.createRadialGradient(w / 2, h / 2, h * 0.2, w / 2, h / 2, h * 0.85);
            vg.addColorStop(0, 'rgba(0,0,0,0)');
            vg.addColorStop(1, 'rgba(0,0,0,0.65)');
            ctx.fillStyle = vg;
            ctx.fillRect(0, 0, w, h);
        }

        function shadeColor(hex, amount) {
            if (hex.startsWith('rgb')) {
                const m = hex.match(/\d+/g);
                return `rgb(${clamp(+m[0] + amount)},${clamp(+m[1] + amount)},${clamp(+m[2] + amount)})`;
            }
            const n = parseInt(hex.slice(1), 16);
            const r = clamp(((n >> 16) & 0xff) + amount);
            const g = clamp(((n >> 8) & 0xff) + amount);
            const b = clamp((n & 0xff) + amount);
            return `rgb(${r},${g},${b})`;
        }
        function clamp(v) { return Math.max(0, Math.min(255, v)) }

        // Helper: map a point in "room space" to canvas using perspective
        // roomX: -1..1 (left-right), roomY: -1..1 (bottom-top), roomZ: 0..1 (back-front)
        function perspPoint(vx, vy, fBL, fBR, fTL, fTR, nBL, nBR, nTL, nTR, rx, ry, rz) {
            // blend between far and near
            const ftlX = fTL[0] + (fTR[0] - fTL[0]) * (rx * 0.5 + 0.5);
            const ftlY = fTL[1] + (fBL[1] - fTL[1]) * (ry * 0.5 + 0.5); // wrong — let's do it properly
            const nearX = nTL[0] + (nTR[0] - nTL[0]) * (rx * 0.5 + 0.5);
            const nearY = nTL[1] + (nBL[1] - nTL[1]) * (ry * 0.5 + 0.5);
            const farX = fTL[0] + (fTR[0] - fTL[0]) * (rx * 0.5 + 0.5);
            const farY = fTL[1] + (fBL[1] - fTL[1]) * (ry * 0.5 + 0.5);
            return [
                nearX + (farX - nearX) * rz,
                nearY + (farY - nearY) * rz
            ];
        }

        // ============================================================
        // ROOM FEATURE DRAWERS
        // All use the "featCtx" object with perspective helpers
        // ============================================================

        function perspPt(fc, rx, ry, rz) {
            // rx: -1=left,1=right  ry: -1=top,1=bottom  rz: 0=near,1=far
            const t = rz;
            const nx = fc.nTL[0] + (fc.nTR[0] - fc.nTL[0]) * (rx * 0.5 + 0.5);
            const ny = fc.nTL[1] + (fc.nBL[1] - fc.nTL[1]) * (ry * 0.5 + 0.5);
            const fx = fc.fTL[0] + (fc.fTR[0] - fc.fTL[0]) * (rx * 0.5 + 0.5);
            const fy = fc.fTL[1] + (fc.fBL[1] - fc.fTL[1]) * (ry * 0.5 + 0.5);
            return [nx + (fx - nx) * t, ny + (fy - ny) * t];
        }

        // Floor point (y always at floor level)
        function floorPt(fc, rx, rz) { return perspPt(fc, rx, 1, rz); }
        // Ceiling point
        function ceilPt(fc, rx, rz) { return perspPt(fc, rx, -1, rz); }
        // Wall point at arbitrary height
        function wallPt(fc, rx, ry, rz) { return perspPt(fc, rx, ry, rz); }

        // Quad helper
        function quad(ctx, p1, p2, p3, p4, fill, stroke, sw = 1) {
            ctx.beginPath();
            ctx.moveTo(p1[0], p1[1]);
            ctx.lineTo(p2[0], p2[1]);
            ctx.lineTo(p3[0], p3[1]);
            ctx.lineTo(p4[0], p4[1]);
            ctx.closePath();
            if (fill) { ctx.fillStyle = fill; ctx.fill() }
            if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = sw; ctx.stroke() }
        }

        // ---- ENTRANCE ----
        function drawEntrance(fc, alpha) {
            const { ctx, w, h } = fc;
            ctx.save();
            ctx.globalAlpha = alpha;

            // Chandelier — hanging from ceiling center
            const chTop = ceilPt(fc, 0, 0.55);
            const chBot = wallPt(fc, 0, -0.3, 0.55);
            // Chain
            ctx.beginPath();
            ctx.moveTo(chTop[0], chTop[1]);
            ctx.lineTo(chBot[0], chBot[1]);
            ctx.strokeStyle = 'rgba(201,168,76,0.6)';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            // Chandelier body
            const cR = fc.fW * 0.15;
            ctx.beginPath();
            ctx.ellipse(chBot[0], chBot[1], cR, cR * 0.25, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(201,168,76,0.15)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(201,168,76,0.5)';
            ctx.lineWidth = 1;
            ctx.stroke();
            // Chandelier light glow
            const cGlow = ctx.createRadialGradient(chBot[0], chBot[1], 0, chBot[0], chBot[1], cR * 3);
            cGlow.addColorStop(0, 'rgba(255,210,120,0.12)');
            cGlow.addColorStop(1, 'rgba(255,210,120,0)');
            ctx.fillStyle = cGlow;
            ctx.beginPath();
            ctx.ellipse(chBot[0], chBot[1] + cR, cR * 3, cR * 5, 0, 0, Math.PI * 2);
            ctx.fill();
            // Candle arms
            for (let i = -2; i <= 2; i++) {
                if (i === 0) continue;
                const arm = wallPt(fc, i * 0.12, -0.28, 0.55);
                ctx.beginPath();
                ctx.moveTo(chBot[0], chBot[1]);
                ctx.lineTo(arm[0], arm[1]);
                ctx.strokeStyle = 'rgba(201,168,76,0.4)';
                ctx.lineWidth = 1;
                ctx.stroke();
                // candle flame
                ctx.beginPath();
                ctx.arc(arm[0], arm[1] - 3, 3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,180,50,0.7)';
                ctx.fill();
            }

            // Grand archway on back wall
            const aL = wallPt(fc, -0.35, 1, 0.95);
            const aR = wallPt(fc, 0.35, 1, 0.95);
            const aTop = wallPt(fc, 0, -0.6, 0.95);
            ctx.beginPath();
            ctx.moveTo(aL[0], aL[1]);
            ctx.lineTo(aL[0], aTop[1] + Math.abs(aTop[1] - aL[1]) * 0.3);
            ctx.quadraticCurveTo(aL[0], aTop[1], (aL[0] + aR[0]) / 2, aTop[1]);
            ctx.quadraticCurveTo(aR[0], aTop[1], aR[0], aTop[1] + Math.abs(aTop[1] - aL[1]) * 0.3);
            ctx.lineTo(aR[0], aR[1]);
            ctx.strokeStyle = 'rgba(201,168,76,0.4)';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            // arch inner glow
            const archGlow = ctx.createRadialGradient(
                (aL[0] + aR[0]) / 2, aTop[1] + 20, 5,
                (aL[0] + aR[0]) / 2, aTop[1] + 20, (aR[0] - aL[0]) * 0.6
            );
            archGlow.addColorStop(0, 'rgba(255,200,100,0.08)');
            archGlow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = archGlow;
            ctx.beginPath();
            ctx.moveTo(aL[0], aL[1]);
            ctx.lineTo(aL[0], aTop[1] + Math.abs(aTop[1] - aL[1]) * 0.3);
            ctx.quadraticCurveTo(aL[0], aTop[1], (aL[0] + aR[0]) / 2, aTop[1]);
            ctx.quadraticCurveTo(aR[0], aTop[1], aR[0], aTop[1] + Math.abs(aTop[1] - aL[1]) * 0.3);
            ctx.lineTo(aR[0], aR[1]);
            ctx.closePath();
            ctx.fill();

            // Side console tables
            const tLB = floorPt(fc, -0.75, 0.6);
            const tRB = floorPt(fc, -0.65, 0.6);
            const tLT = wallPt(fc, -0.75, -0.1, 0.6);
            const tRT = wallPt(fc, -0.65, -0.1, 0.6);
            quad(ctx, tLT, tRT, tRB, tLB, 'rgba(25,18,10,0.9)', 'rgba(201,168,76,0.3)', 1);
            // vase on console
            const vBase = wallPt(fc, -0.7, -0.08, 0.6);
            const vTop = wallPt(fc, -0.7, -0.28, 0.6);
            const vR = Math.abs(tRT[0] - tLT[0]) * 0.4;
            ctx.beginPath();
            ctx.moveTo(vBase[0] - vR * 0.6, vBase[1]);
            ctx.bezierCurveTo(vBase[0] - vR, vBase[1] - 5, vTop[0] - vR * 1.2, vTop[1] + 5, vTop[0], vTop[1]);
            ctx.bezierCurveTo(vTop[0] + vR * 1.2, vTop[1] + 5, vBase[0] + vR, vBase[1] - 5, vBase[0] + vR * 0.6, vBase[1]);
            ctx.closePath();
            ctx.fillStyle = 'rgba(35,28,18,0.9)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(201,168,76,0.35)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Floor medallion
            const fMed = floorPt(fc, 0, 0.7);
            const mR = Math.abs(floorPt(fc, 0.15, 0.7)[0] - floorPt(fc, 0, 0.7)[0]);
            ctx.beginPath();
            ctx.ellipse(fMed[0], fMed[1], mR, mR * 0.2, 0, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(201,168,76,0.25)';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.beginPath();
            ctx.ellipse(fMed[0], fMed[1], mR * 0.7, mR * 0.14, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.ellipse(fMed[0], fMed[1], mR * 0.4, mR * 0.08, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // ---- LOBBY ----
        function drawLobby(fc, alpha) {
            const { ctx } = fc;
            ctx.save();
            ctx.globalAlpha = alpha;

            // Floating staircase on left wall
            for (let s = 0; s < 7; s++) {
                const t = 0.4 + s * 0.07;
                const yOff = -0.9 + s * 0.25;
                const sL = wallPt(fc, -1, yOff, t);
                const sR = wallPt(fc, -0.55, yOff, t);
                const sLB = wallPt(fc, -1, yOff + 0.08, t);
                const sRB = wallPt(fc, -0.55, yOff + 0.08, t);
                quad(ctx, sL, sR, sRB, sLB, 'rgba(18,14,8,0.95)', 'rgba(201,168,76,0.25)', 0.8);
                // step riser shadow
                const rise = wallPt(fc, -0.55, yOff, t);
                const riseB = wallPt(fc, -0.55, yOff + 0.1, t);
                ctx.beginPath();
                ctx.moveTo(sR[0], sR[1]);
                ctx.lineTo(sRB[0], sRB[1]);
                ctx.strokeStyle = 'rgba(201,168,76,0.15)';
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }
            // Stair rail
            const railBot = wallPt(fc, -0.55, 0.8, 0.42);
            const railTop = wallPt(fc, -0.55, -0.7, 0.88);
            ctx.beginPath();
            ctx.moveTo(railBot[0], railBot[1]);
            ctx.lineTo(railTop[0], railTop[1]);
            ctx.strokeStyle = 'rgba(201,168,76,0.5)';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Gallery frames on right wall
            const frames = [
                { rx: 0.8, ry: -0.4, rz: 0.45, w: 0.1, h: 0.2 },
                { rx: 0.75, ry: -0.05, rz: 0.5, w: 0.08, h: 0.14 },
                { rx: 0.82, ry: 0.25, rz: 0.55, w: 0.09, h: 0.12 },
            ];
            frames.forEach(f => {
                const tl = wallPt(fc, f.rx - f.w, f.ry - f.h, f.rz);
                const tr = wallPt(fc, f.rx + f.w, f.ry - f.h, f.rz);
                const bl = wallPt(fc, f.rx - f.w, f.ry + f.h, f.rz);
                const br = wallPt(fc, f.rx + f.w, f.ry + f.h, f.rz);
                quad(ctx, tl, tr, br, bl, 'rgba(8,8,10,0.9)', 'rgba(201,168,76,0.35)', 1);
                // art lines
                ctx.beginPath();
                ctx.moveTo((tl[0] + bl[0]) / 2, (tl[1] + bl[1]) / 2);
                ctx.lineTo((tr[0] + br[0]) / 2, (tr[1] + br[1]) / 2);
                ctx.strokeStyle = 'rgba(201,168,76,0.1)';
                ctx.lineWidth = 0.5;
                ctx.stroke();
            });

            // Hanging plants cascading from ceiling
            const plantX = [0.3, -0.1];
            plantX.forEach((px, i) => {
                const ph = ceilPt(fc, px, 0.5 + i * 0.08);
                ctx.beginPath();
                ctx.moveTo(ph[0], ph[1]);
                ctx.lineTo(ph[0], ph[1] + 30 * (1 - fc.frac * 0.3));
                ctx.strokeStyle = 'rgba(50,80,30,0.5)';
                ctx.lineWidth = 1;
                ctx.stroke();
                // leaf cluster
                for (let j = 0; j < 5; j++) {
                    const ly = ph[1] + j * 6 * (1 - fc.frac * 0.3);
                    const lx = ph[0] + (j % 2 === 0 ? 6 : -6);
                    ctx.beginPath();
                    ctx.ellipse(lx, ly, 5, 3, j * 0.5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(30,${50 + j * 8},20,0.6)`;
                    ctx.fill();
                }
                // pot
                ctx.beginPath();
                ctx.arc(ph[0], ph[1], 6 * (fc.farScale * 3.5), 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(35,25,15,0.8)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(201,168,76,0.3)';
                ctx.lineWidth = 0.8;
                ctx.stroke();
            });

            // Hallway table center
            const htL = floorPt(fc, -0.12, 0.65);
            const htR = floorPt(fc, 0.12, 0.65);
            const htLT = wallPt(fc, -0.12, -0.05, 0.65);
            const htRT = wallPt(fc, 0.12, -0.05, 0.65);
            quad(ctx, htLT, htRT, htR, htL, 'rgba(20,15,8,0.95)', 'rgba(201,168,76,0.3)', 1);
            // mirror above table
            const mTL = wallPt(fc, -0.15, -0.6, 0.67);
            const mTR = wallPt(fc, 0.15, -0.6, 0.67);
            const mBL = wallPt(fc, -0.15, -0.1, 0.67);
            const mBR = wallPt(fc, 0.15, -0.1, 0.67);
            quad(ctx, mTL, mTR, mBR, mBL, 'rgba(10,12,15,0.8)', 'rgba(201,168,76,0.5)', 1.5);
            // mirror shimmer
            ctx.beginPath();
            ctx.moveTo(mTL[0] + 2, mTL[1] + 2);
            ctx.lineTo(mBR[0] - 2, mBR[1] - 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.06)';
            ctx.lineWidth = 3;
            ctx.stroke();

            ctx.restore();
        }

        // ---- KITCHEN ----
        function drawKitchen(fc, alpha) {
            const { ctx, fW, fH } = fc;
            ctx.save();
            ctx.globalAlpha = alpha;

            // Island counter
            const iL = floorPt(fc, -0.25, 0.7);
            const iR = floorPt(fc, 0.25, 0.7);
            const iLT = wallPt(fc, -0.25, -0.02, 0.7);
            const iRT = wallPt(fc, 0.25, -0.02, 0.7);
            quad(ctx, iLT, iRT, iR, iL, 'rgba(22,18,10,0.95)', 'rgba(201,168,76,0.3)', 1);
            // marble top
            const iML = wallPt(fc, -0.26, -0.025, 0.7);
            const iMR = wallPt(fc, 0.26, -0.025, 0.7);
            const iMLf = wallPt(fc, -0.26, -0.005, 0.7);
            const iMRf = wallPt(fc, 0.26, -0.005, 0.7);
            quad(ctx, iML, iMR, iMRf, iMLf, 'rgba(240,236,224,0.95)', 'rgba(201,168,76,0.2)', 0.5);
            // island marble vein
            ctx.beginPath();
            ctx.moveTo((iML[0] + iMLf[0]) / 2, (iML[1] + iMLf[1]) / 2);
            ctx.bezierCurveTo(
                iML[0] + (iMR[0] - iML[0]) * 0.3, iML[1] + 2,
                iML[0] + (iMR[0] - iML[0]) * 0.6, iML[1] - 1,
                (iMR[0] + iMRf[0]) / 2, (iMR[1] + iMRf[1]) / 2
            );
            ctx.strokeStyle = 'rgba(180,170,155,0.3)';
            ctx.lineWidth = 0.7;
            ctx.stroke();

            // Pendant lights over island
            for (let i = -1; i <= 1; i++) {
                const pTop = ceilPt(fc, i * 0.12, 0.68);
                const pBot = wallPt(fc, i * 0.12, -0.15, 0.68);
                ctx.beginPath();
                ctx.moveTo(pTop[0], pTop[1]);
                ctx.lineTo(pBot[0], pBot[1]);
                ctx.strokeStyle = 'rgba(201,168,76,0.4)';
                ctx.lineWidth = 0.8;
                ctx.stroke();
                const pr = fW * 0.025;
                ctx.beginPath();
                ctx.arc(pBot[0], pBot[1], pr, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(20,15,8,0.9)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(201,168,76,0.5)';
                ctx.lineWidth = 0.8;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(pBot[0], pBot[1] + 1, pr * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,200,100,0.8)';
                ctx.fill();
                // light cone
                const lg = ctx.createRadialGradient(pBot[0], pBot[1], 0, pBot[0], pBot[1] + 20, pr * 4);
                lg.addColorStop(0, 'rgba(255,200,100,0.12)');
                lg.addColorStop(1, 'rgba(255,200,100,0)');
                ctx.fillStyle = lg;
                ctx.beginPath();
                ctx.ellipse(pBot[0], pBot[1] + 20, pr * 4, pr * 1.5, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            // Upper cabinets — back wall
            const ucL = wallPt(fc, -0.85, -0.3, 0.93);
            const ucR = wallPt(fc, 0.85, -0.3, 0.93);
            const ucLB = wallPt(fc, -0.85, 0.05, 0.93);
            const ucRB = wallPt(fc, 0.85, 0.05, 0.93);
            quad(ctx, ucL, ucR, ucRB, ucLB, 'rgba(18,14,8,0.95)', 'rgba(201,168,76,0.25)', 1);
            // Cabinet door lines
            for (let d = -2; d <= 2; d++) {
                const dx = d * 0.33;
                const cL = wallPt(fc, dx - 0.14, -0.28, 0.93);
                const cR = wallPt(fc, dx + 0.14, -0.28, 0.93);
                const cLB = wallPt(fc, dx - 0.14, 0.03, 0.93);
                const cRB = wallPt(fc, dx + 0.14, 0.03, 0.93);
                quad(ctx, cL, cR, cRB, cLB, null, 'rgba(201,168,76,0.15)', 0.5);
                // handle
                const hm = wallPt(fc, dx, -0.13, 0.93);
                const hmR = wallPt(fc, dx + 0.06, -0.13, 0.93);
                ctx.beginPath();
                ctx.moveTo(hm[0], hm[1]);
                ctx.lineTo(hmR[0], hmR[1]);
                ctx.strokeStyle = 'rgba(201,168,76,0.5)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // Counter below cabinets — back
            const cnL = wallPt(fc, -0.88, 0.05, 0.92);
            const cnR = wallPt(fc, 0.88, 0.05, 0.92);
            const cnLF = wallPt(fc, -0.88, 0.07, 0.92);
            const cnRF = wallPt(fc, 0.88, 0.07, 0.92);
            quad(ctx, cnL, cnR, cnRF, cnLF, 'rgba(235,228,215,0.9)', 'rgba(201,168,76,0.2)', 0.5);

            // Cooktop / range hood on right wall
            const rhTL = wallPt(fc, 0.72, -0.5, 0.6);
            const rhTR = wallPt(fc, 0.98, -0.5, 0.6);
            const rhBL = wallPt(fc, 0.72, 0.04, 0.6);
            const rhBR = wallPt(fc, 0.98, 0.04, 0.6);
            quad(ctx, rhTL, rhTR, rhBR, rhBL, 'rgba(15,13,10,0.95)', 'rgba(201,168,76,0.2)', 0.8);
            // hood
            const hTL = wallPt(fc, 0.7, -0.5, 0.58);
            const hTR = wallPt(fc, 1.0, -0.5, 0.58);
            const hBL = wallPt(fc, 0.73, -0.2, 0.58);
            const hBR = wallPt(fc, 0.97, -0.2, 0.58);
            quad(ctx, hTL, hTR, hBR, hBL, 'rgba(20,17,12,0.9)', 'rgba(201,168,76,0.2)', 0.8);
            // burner circles
            const burnerCx = (rhTL[0] + rhTR[0]) / 2;
            const burnerCy = (rhBL[1] + rhTL[1]) / 2;
            const bR = Math.abs(rhTR[0] - rhTL[0]) * 0.25;
            ctx.beginPath();
            ctx.arc(burnerCx - bR * 0.8, burnerCy, bR, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(201,168,76,0.2)';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(burnerCx + bR * 0.8, burnerCy, bR * 0.8, 0, Math.PI * 2);
            ctx.stroke();

            // Bar stools
            for (let s = -1; s <= 1; s += 2) {
                const stBase = floorPt(fc, s * 0.15, 0.5);
                const stTop = wallPt(fc, s * 0.15, -0.05, 0.5);
                ctx.beginPath();
                ctx.moveTo(stBase[0], stBase[1]);
                ctx.lineTo(stTop[0], stTop[1]);
                ctx.strokeStyle = 'rgba(201,168,76,0.35)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                const sR = Math.abs(floorPt(fc, s * 0.15 + 0.04, 0.5)[0] - floorPt(fc, s * 0.15, 0.5)[0]);
                ctx.beginPath();
                ctx.ellipse(stTop[0], stTop[1], sR * 1.5, sR * 0.5, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(20,15,8,0.85)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(201,168,76,0.3)';
                ctx.lineWidth = 0.8;
                ctx.stroke();
            }

            ctx.restore();
        }

        // ---- BATHROOM ----
        function drawBathroom(fc, alpha) {
            const { ctx, fW } = fc;
            ctx.save();
            ctx.globalAlpha = alpha;

            // Freestanding bathtub
            const btL = floorPt(fc, -0.35, 0.72);
            const btR = floorPt(fc, 0.35, 0.72);
            const btLT = wallPt(fc, -0.35, -0.12, 0.72);
            const btRT = wallPt(fc, 0.35, -0.12, 0.72);
            // tub body — elliptical
            const tCx = (btL[0] + btR[0]) / 2, tCy = (btLT[1] + btRT[1]) / 2;
            const tRx = Math.abs(btR[0] - btL[0]) / 2;
            const tRy = Math.abs(btL[1] - btLT[1]) / 2;
            ctx.beginPath();
            ctx.ellipse(tCx, (btL[1] + btLT[1]) / 2, tRx, tRy * 1.1, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(230,228,224,0.95)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(201,168,76,0.3)';
            ctx.lineWidth = 1.2;
            ctx.stroke();
            // tub inner dark
            ctx.beginPath();
            ctx.ellipse(tCx, (btL[1] + btLT[1]) / 2 - 2, tRx * 0.85, tRy * 0.7, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(8,12,18,0.85)';
            ctx.fill();
            // water
            ctx.beginPath();
            ctx.ellipse(tCx, (btL[1] + btLT[1]) / 2 - 2, tRx * 0.78, tRy * 0.55, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(100,160,220,0.1)';
            ctx.fill();
            // tub feet
            const ftR = tRx * 0.08;
            [[tCx - tRx * 0.75, btL[1]], [tCx + tRx * 0.75, btR[1]]].forEach(([fx, fy]) => {
                ctx.beginPath();
                ctx.ellipse(fx, fy, ftR, ftR * 0.4, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(180,148,60,0.7)';
                ctx.fill();
            });
            // faucet
            const faucetB = wallPt(fc, 0.05, -0.14, 0.72);
            const faucetT = wallPt(fc, 0.05, -0.28, 0.72);
            ctx.beginPath();
            ctx.moveTo(faucetB[0], faucetB[1]);
            ctx.lineTo(faucetT[0], faucetT[1]);
            ctx.strokeStyle = 'rgba(201,168,76,0.7)';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(faucetT[0], faucetT[1]);
            ctx.quadraticCurveTo(faucetT[0] + 8, faucetT[1] - 3, faucetT[0] + 14, faucetT[1] + 2);
            ctx.strokeStyle = 'rgba(201,168,76,0.7)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Mirror — back wall
            const mTL = wallPt(fc, -0.55, -0.75, 0.94);
            const mTR = wallPt(fc, -0.05, -0.75, 0.94);
            const mBL = wallPt(fc, -0.55, -0.1, 0.94);
            const mBR = wallPt(fc, -0.05, -0.1, 0.94);
            quad(ctx, mTL, mTR, mBR, mBL, 'rgba(10,14,20,0.85)', 'rgba(201,168,76,0.5)', 1.5);
            // mirror light strip top
            const mlL = wallPt(fc, -0.55, -0.77, 0.94);
            const mlR = wallPt(fc, -0.05, -0.77, 0.94);
            const mlLb = wallPt(fc, -0.55, -0.74, 0.94);
            const mlRb = wallPt(fc, -0.05, -0.74, 0.94);
            quad(ctx, mlL, mlR, mlRb, mlLb, 'rgba(255,240,200,0.4)', null);
            // shimmer
            ctx.beginPath();
            ctx.moveTo(mTL[0] + 2, mTL[1] + 2);
            ctx.lineTo(mBR[0] - 2, mBR[1] - 2);
            ctx.strokeStyle = 'rgba(200,220,255,0.07)';
            ctx.lineWidth = 4;
            ctx.stroke();

            // Vanity basin
            const vL = wallPt(fc, -0.6, 0.05, 0.92);
            const vR = wallPt(fc, -0.05, 0.05, 0.92);
            const vLT = wallPt(fc, -0.6, -0.0, 0.92);
            const vRT = wallPt(fc, -0.05, -0.0, 0.92);
            quad(ctx, vLT, vRT, vR, vL, 'rgba(225,220,210,0.9)', 'rgba(201,168,76,0.3)', 1);
            // basin sink
            const bsCx = (vLT[0] + vRT[0]) / 2, bsCy = (vLT[1] + vRT[1]) / 2;
            const bsRx = Math.abs(vRT[0] - vLT[0]) * 0.35;
            ctx.beginPath();
            ctx.ellipse(bsCx, bsCy, bsRx, bsRx * 0.25, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(12,18,25,0.9)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(201,168,76,0.3)';
            ctx.lineWidth = 0.8;
            ctx.stroke();

            // Towel rail on right wall
            const trT = wallPt(fc, 0.88, -0.35, 0.5);
            const trB = wallPt(fc, 0.88, 0.2, 0.5);
            ctx.beginPath();
            ctx.moveTo(trT[0], trT[1]);
            ctx.lineTo(trB[0], trB[1]);
            ctx.strokeStyle = 'rgba(201,168,76,0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();
            // towel
            const twT = wallPt(fc, 0.84, -0.15, 0.5);
            const twB = wallPt(fc, 0.84, 0.15, 0.5);
            ctx.beginPath();
            ctx.moveTo(twT[0], twT[1]);
            ctx.lineTo(twB[0], twB[1]);
            ctx.strokeStyle = 'rgba(230,220,205,0.6)';
            ctx.lineWidth = 5;
            ctx.stroke();

            // Candles on tub edge
            [[tCx - tRx * 0.65, btL[1] - tRy * 0.8], [tCx + tRx * 0.65, btR[1] - tRy * 0.8]].forEach(([cx, cy]) => {
                ctx.beginPath();
                ctx.rect(cx - 2, cy - 8, 4, 8);
                ctx.fillStyle = 'rgba(240,230,210,0.9)';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx, cy - 10, 3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,160,40,0.8)';
                ctx.fill();
                const cg = ctx.createRadialGradient(cx, cy - 10, 0, cx, cy - 10, 12);
                cg.addColorStop(0, 'rgba(255,160,40,0.15)');
                cg.addColorStop(1, 'rgba(255,160,40,0)');
                ctx.fillStyle = cg;
                ctx.beginPath();
                ctx.arc(cx, cy - 10, 12, 0, Math.PI * 2);
                ctx.fill();
            });

            // Overhead rain shower (right of center)
            const showerCx = (wallPt(fc, 0.3, -1, 0.7)[0] + wallPt(fc, 0.3, 0, 0.7)[0]) / 2;
            const showerCy = ceilPt(fc, 0.3, 0.7)[1];
            const shR = fW * 0.04;
            ctx.beginPath();
            ctx.rect(showerCx - shR, showerCy, shR * 2, 4);
            ctx.fillStyle = 'rgba(150,170,190,0.4)';
            ctx.fill();
            // rain drops
            for (let d = 0; d < 8; d++) {
                const dx = showerCx - shR + shR * 2 * (d / 7);
                const dyOff = (d * 37) % 30;
                ctx.beginPath();
                ctx.moveTo(dx, showerCy + 4 + dyOff);
                ctx.lineTo(dx, showerCy + 10 + dyOff);
                ctx.strokeStyle = 'rgba(150,200,240,0.25)';
                ctx.lineWidth = 0.8;
                ctx.stroke();
            }

            ctx.restore();
        }

        // ---- BEDROOM ----
        function drawBedroom(fc, alpha) {
            const { ctx, fW, fH } = fc;
            ctx.save();
            ctx.globalAlpha = alpha;

            // BED — occupies center
            // Headboard against back wall
            const hbL = wallPt(fc, -0.45, -0.65, 0.88);
            const hbR = wallPt(fc, 0.45, -0.65, 0.88);
            const hbLB = wallPt(fc, -0.45, 0.02, 0.88);
            const hbRB = wallPt(fc, 0.45, 0.02, 0.88);
            quad(ctx, hbL, hbR, hbRB, hbLB, 'rgba(30,22,42,0.95)', 'rgba(150,100,200,0.35)', 1.5);
            // headboard tuft pattern
            for (let bx = -3; bx <= 3; bx++) {
                for (let by = 0; by <= 3; by++) {
                    const bp = wallPt(fc, bx * 0.12, by * 0.15 - 0.5, 0.88);
                    ctx.beginPath();
                    ctx.arc(bp[0], bp[1], 2, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(150,100,200,0.2)';
                    ctx.fill();
                }
            }
            // headboard gold trim top
            const htL = wallPt(fc, -0.46, -0.67, 0.88);
            const htR = wallPt(fc, 0.46, -0.67, 0.88);
            const htLB = wallPt(fc, -0.46, -0.64, 0.88);
            const htRB = wallPt(fc, 0.46, -0.64, 0.88);
            quad(ctx, htL, htR, htRB, htLB, 'rgba(201,168,76,0.4)', null);

            // Mattress/duvet
            const mtL = wallPt(fc, -0.44, -0.01, 0.88);
            const mtR = wallPt(fc, 0.44, -0.01, 0.88);
            const mtLF = wallPt(fc, -0.44, 0.03, 0.65);
            const mtRF = wallPt(fc, 0.44, 0.03, 0.65);
            quad(ctx, mtL, mtR, mtRF, mtLF, 'rgba(220,210,200,0.95)', 'rgba(201,168,76,0.15)', 0.8);
            // duvet top face (top looking down)
            const dvL = wallPt(fc, -0.44, -0.01, 0.88);
            const dvR = wallPt(fc, 0.44, -0.01, 0.88);
            const dvLF = floorPt(fc, -0.44, 0.65);
            const dvRF = floorPt(fc, 0.44, 0.65);
            quad(ctx, dvL, dvR, dvRF, dvLF, 'rgba(215,205,195,0.9)', 'rgba(201,168,76,0.1)', 0.5);
            // duvet folds
            for (let f = 0; f < 4; f++) {
                const t = 0.15 + f * 0.2;
                const fl1 = wallPt(fc, -0.44, -0.01 + t * 0.04, 0.88 + (1 - 0.88) * t);
                const fr1 = wallPt(fc, 0.44, -0.01 + t * 0.04, 0.88 + (1 - 0.88) * t);
                ctx.beginPath();
                ctx.moveTo(fl1[0], fl1[1]);
                ctx.lineTo(fr1[0], fr1[1]);
                ctx.strokeStyle = 'rgba(180,170,160,0.2)';
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }

            // Pillows
            [[-0.25, -0.08], [-0.05, -0.07], [0.05, -0.07], [0.25, -0.08]].forEach(([px, py]) => {
                const pTL = wallPt(fc, px - 0.1, py - 0.06, 0.875);
                const pTR = wallPt(fc, px + 0.1, py - 0.06, 0.875);
                const pBL = wallPt(fc, px - 0.1, py + 0.06, 0.875);
                const pBR = wallPt(fc, px + 0.1, py + 0.06, 0.875);
                quad(ctx, pTL, pTR, pBR, pBL, 'rgba(240,232,220,0.95)', 'rgba(201,168,76,0.2)', 0.8);
            });

            // Bedside tables
            [[-0.6, 0.04], [0.6, 0.04]].forEach(([bx, by]) => {
                const btTL = wallPt(fc, bx - 0.1, by, 0.88);
                const btTR = wallPt(fc, bx + 0.1, by, 0.88);
                const btBL = floorPt(fc, bx - 0.1, 0.88);
                const btBR = floorPt(fc, bx + 0.1, 0.88);
                quad(ctx, btTL, btTR, btBR, btBL, 'rgba(22,16,34,0.95)', 'rgba(150,100,200,0.25)', 1);
                // marble top
                const mL = wallPt(fc, bx - 0.105, by - 0.01, 0.88);
                const mR = wallPt(fc, bx + 0.105, by - 0.01, 0.88);
                const mLF = wallPt(fc, bx - 0.105, by + 0.01, 0.88);
                const mRF = wallPt(fc, bx + 0.105, by + 0.01, 0.88);
                quad(ctx, mL, mR, mRF, mLF, 'rgba(230,225,218,0.9)', null);
                // bedside lamp
                const lBase = wallPt(fc, bx, by - 0.02, 0.88);
                const lTop = wallPt(fc, bx, by - 0.25, 0.88);
                ctx.beginPath();
                ctx.moveTo(lBase[0], lBase[1]);
                ctx.lineTo(lTop[0], lTop[1]);
                ctx.strokeStyle = 'rgba(201,168,76,0.5)';
                ctx.lineWidth = 1;
                ctx.stroke();
                const lShR = Math.abs(wallPt(fc, bx + 0.05, by - 0.25, 0.88)[0] - lTop[0]);
                ctx.beginPath();
                ctx.ellipse(lTop[0], lTop[1], lShR, lShR * 0.4, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(22,16,34,0.9)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(150,100,200,0.35)';
                ctx.lineWidth = 0.8;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(lTop[0], lTop[1], lShR * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(200,160,255,0.7)';
                ctx.fill();
                // lamp glow
                const lg = ctx.createRadialGradient(lTop[0], lTop[1] + 5, 0, lTop[0], lTop[1] + 15, lShR * 5);
                lg.addColorStop(0, 'rgba(150,100,200,0.12)');
                lg.addColorStop(1, 'rgba(150,100,200,0)');
                ctx.fillStyle = lg;
                ctx.beginPath();
                ctx.ellipse(lTop[0], lTop[1] + 15, lShR * 5, lShR * 3, 0, 0, Math.PI * 2);
                ctx.fill();
            });

            // Hanging pendant lights
            [[-0.6, 0.7], [0.6, 0.7]].forEach(([px, pz]) => {
                const pTop = ceilPt(fc, px, pz);
                const pBot = wallPt(fc, px, -0.18, pz);
                ctx.beginPath();
                ctx.moveTo(pTop[0], pTop[1]);
                ctx.lineTo(pBot[0], pBot[1]);
                ctx.strokeStyle = 'rgba(150,100,200,0.25)';
                ctx.lineWidth = 0.8;
                ctx.stroke();
                const pR = fW * 0.018;
                ctx.beginPath();
                ctx.arc(pBot[0], pBot[1], pR, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(22,16,34,0.9)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(150,100,200,0.4)';
                ctx.lineWidth = 0.8;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(pBot[0], pBot[1], pR * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(200,160,255,0.7)';
                ctx.fill();
            });

            // Rug
            const rugL = floorPt(fc, -0.42, 0.88);
            const rugR = floorPt(fc, 0.42, 0.88);
            const rugLF = floorPt(fc, -0.42, 0.5);
            const rugRF = floorPt(fc, 0.42, 0.5);
            ctx.save();
            ctx.globalAlpha = alpha * 0.5;
            quad(ctx, rugL, rugR, rugRF, rugLF, 'rgba(40,25,70,0.55)', null);
            ctx.globalAlpha = alpha * 0.25;
            quad(ctx, rugL, rugR, rugRF, rugLF, null, 'rgba(150,100,200,0.4)', 1);
            ctx.restore();

            // Window — right wall with moonlight
            const wTL = wallPt(fc, 0.8, -0.7, 0.55);
            const wTR = wallPt(fc, 0.98, -0.7, 0.55);
            const wBL = wallPt(fc, 0.8, 0.0, 0.55);
            const wBR = wallPt(fc, 0.98, 0.0, 0.55);
            quad(ctx, wTL, wTR, wBR, wBL, 'rgba(10,8,20,0.8)', 'rgba(150,100,200,0.35)', 1);
            // moonlight glow through window
            const wCx = (wTL[0] + wTR[0]) / 2, wCy = (wTL[1] + wBL[1]) / 2;
            const wGlow = ctx.createRadialGradient(wCx, wCy, 0, wCx, wCy, 80);
            wGlow.addColorStop(0, 'rgba(120,80,200,0.06)');
            wGlow.addColorStop(1, 'rgba(120,80,200,0)');
            ctx.fillStyle = wGlow;
            ctx.beginPath();
            ctx.arc(wCx, wCy, 80, 0, Math.PI * 2);
            ctx.fill();
            // stars in window
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            [[wCx - 8, wCy - 10], [wCx + 5, wCy - 6], [wCx - 2, wCy + 8], [wCx + 10, wCy + 4]].forEach(([sx, sy]) => {
                ctx.beginPath();
                ctx.arc(sx, sy, 0.8, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.restore();
        }

        // Init label for first room
        setTimeout(() => {
            if (!started) {
                document.getElementById('room-eyebrow').innerHTML = ROOMS[0].eyebrow;
                document.getElementById('room-title').innerHTML = ROOMS[0].title;
                document.getElementById('room-desc').textContent = ROOMS[0].desc;
            }
        }, 100);

        // Draw once immediately
        draw();
    </script>
</body>
